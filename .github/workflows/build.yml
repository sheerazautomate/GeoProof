name: GeoProof — Build Signed APK

on:
  push:
    branches: [main, 'agents/**']
  workflow_dispatch:

jobs:
  build-android:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 1b. Free disk space ────────────────────────────────────────────────
      #   ubuntu-latest runners start with ~25 GB free. A cold Gradle + NDK
      #   build (Skia, vision-camera, quick-crypto) can consume nearly all of
      #   it, crashing the runner with "No space left on device".
      #   Removing unused pre-installed software frees ~14–18 GB upfront.
      - name: Free disk space
        run: |
          echo "Disk before cleanup:"
          df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android/sdk/emulator \
            /usr/local/lib/android/sdk/system-images \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY/go" \
            "$AGENT_TOOLSDIRECTORY/node/20.*/x64/share/doc" \
          || true
          sudo apt-get clean
          docker system prune -af || true
          echo "Disk after cleanup:"
          df -h /

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. JDK 17 ──────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Android SDK ─────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install npm deps ────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 5b. Cache Gradle/NDK build outputs ─────────────────────────────────
      #   Speeds up repeated CI runs (native compiles for vision-camera,
      #   quick-crypto, skia etc. are the slow part). No effect on a cold
      #   cache but saves significant time on every run after the first.
      - name: Cache Gradle & native build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
            android/app/.cxx
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json', 'android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle', 'android/app/build.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 6. Decode keystore from Base64 secret ─────────────────────────────
      #   In GitHub repo → Settings → Secrets → Actions, add:
      #     KEYSTORE_BASE64   : base64-encoded .jks keystore file
      #     KEY_ALIAS         : your key alias
      #     KEY_PASSWORD      : key password
      #     STORE_PASSWORD    : keystore password
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/geoproof-release.jks

      # ── 6b. Verify signing secrets before the expensive build ─────────────
      #   Fails in seconds instead of ~45 minutes if KEY_ALIAS / STORE_PASSWORD /
      #   KEY_PASSWORD don't match the keystore. -certreq unlocks the private
      #   key (via -keypass), so it catches a wrong key password too, not just
      #   a wrong store password.
      - name: Verify keystore credentials
        run: |
          keytool -certreq \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -keystore android/app/geoproof-release.jks \
            -storepass "${{ secrets.STORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -file /dev/null \
          || { echo "::error::Keystore/key/alias/password secrets do not match android/app/geoproof-release.jks. Check KEY_ALIAS, STORE_PASSWORD, KEY_PASSWORD."; exit 1; }

      # ── 7. Write signing config to gradle.properties ──────────────────────
      - name: Write signing properties
        run: |
          cat >> android/gradle.properties <<EOF
          MYAPP_RELEASE_STORE_FILE=geoproof-release.jks
          MYAPP_RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          MYAPP_RELEASE_STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}
          MYAPP_RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      # ── 8. Build release APK ──────────────────────────────────────────────
      #   Restricted to arm64-v8a + armeabi-v7a: covers virtually all real
      #   Android devices and roughly halves native compile time vs. also
      #   building the two emulator-only ABIs (x86, x86_64).
      - name: Build signed APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=arm64-v8a,armeabi-v7a

      # ── 9. Upload APK artifact ────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GeoProof-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
