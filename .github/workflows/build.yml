name: GeoProof — Build Signed APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. JDK 17 ──────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Android SDK ─────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install npm deps ────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 6. Decode keystore from Base64 secret ─────────────────────────────
      #   In GitHub repo → Settings → Secrets → Actions, add:
      #     KEYSTORE_BASE64   : base64-encoded .jks keystore file
      #     KEY_ALIAS         : your key alias
      #     KEY_PASSWORD      : key password
      #     STORE_PASSWORD    : keystore password
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/geoproof-release.jks

      # ── 7. Write signing config to gradle.properties ──────────────────────
      - name: Write signing properties
        run: |
          cat >> android/gradle.properties <<EOF
          MYAPP_RELEASE_STORE_FILE=geoproof-release.jks
          MYAPP_RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          MYAPP_RELEASE_STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}
          MYAPP_RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      # ── 8. Build release APK ──────────────────────────────────────────────
      - name: Build signed APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      # ── 9. Upload APK artifact ────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GeoProof-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
